<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RIKYU User Guide</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f8fafc;
        --panel: #ffffff;
        --text: #172033;
        --muted: #5d6880;
        --border: #d9e1ec;
        --accent: #2456a6;
        --accent-text: #ffffff;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111827;
          --panel: #1f2937;
          --text: #f3f4f6;
          --muted: #c7ceda;
          --border: #374151;
          --accent: #7aa2f7;
          --accent-text: #111827;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.6;
      }

      main {
        width: min(100%, 42rem);
        padding: 2rem;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: clamp(1.8rem, 4vw, 2.5rem);
        line-height: 1.2;
      }

      p {
        margin: 0 0 1.5rem;
        color: var(--muted);
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
      }

      a {
        display: inline-flex;
        align-items: center;
        min-height: 2.75rem;
        padding: 0.65rem 1rem;
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        font-weight: 600;
        text-decoration: none;
      }

      a:first-child {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--accent-text);
      }

      a:focus-visible {
        outline: 3px solid color-mix(in srgb, var(--accent), transparent 45%);
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>RIKYU User Guide</h1>
      <p>Please select a language.</p>
      <nav aria-label="Language selection">
        <a href="./en/">English</a>
        <a href="./ja/">Japanese</a>
      </nav>
    </main>
  </body>
</html>
